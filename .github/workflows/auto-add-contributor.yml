name: Auto Add Contributor

on:
  pull_request_target:
    types: [closed]

jobs:
  add-contributor:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Check if first PR in this repo & invite contributor
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const currentPrNumber = context.payload.pull_request.number;

            // Search for other closed/merged PRs by this author in THIS repo
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              creator: prAuthor,
              per_page: 10
            });

            // Filter for merged PRs other than the current one
            const previousMergedPRs = prs.filter(
              pr => pr.merged_at !== null && pr.number !== currentPrNumber
            );

            if (previousMergedPRs.length === 0) {
              console.log(`${prAuthor} is a first-time contributor to THIS repo! Adding contributor...`);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: currentPrNumber,
                body: `@all-contributors please add @${prAuthor} for docs`
              });
            } else {
              console.log(`${prAuthor} has previously merged PRs in this repo. Skipping.`);
            }
